server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    absolute_redirect off;

    location / {
        try_files $uri $uri/ =404;
    }

    location /docs {
        try_files $uri $uri/ /docs/index.html;
    }

    location /openapi.yaml {
        alias /spec/openapi.yaml;
        add_header Content-Type text/plain;
    }
}
